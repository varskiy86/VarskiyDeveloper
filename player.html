
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.pr{font-family:'Inter',sans-serif;background:#000;color:#fff;border-radius:20px;overflow:hidden;position:relative;min-height:520px}
.glow-bg{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;transition:background 1.8s ease;z-index:0}
.content{position:relative;z-index:1}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 10px}
.topbar-left{display:flex;gap:8px;align-items:center}
.bypass-pill{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 8px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;transition:all .25s;background:rgba(255,255,255,0.04)}
.bypass-pill:hover{border-color:rgba(255,255,255,0.2)}
.bypass-dot{width:8px;height:8px;border-radius:50%;transition:background .25s}
.bypass-label{font-size:11px;letter-spacing:.4px;color:#666;font-weight:500;transition:color .25s}
.bypass-pill.on .bypass-dot{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.6)}
.bypass-pill.on .bypass-label{color:#4ade80}
.bypass-pill:not(.on) .bypass-dot{background:#444}

.topbar-right{display:flex;gap:6px}
.tb-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.05);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:#555}
.tb-btn:hover{background:rgba(255,255,255,0.1);color:#aaa}
.tb-btn.active{color:#fff;background:rgba(255,255,255,0.12)}

.main{display:flex;padding:4px 24px 0;gap:20px;align-items:flex-start}
.karaoke-col{flex:1;min-width:0;height:260px;overflow:hidden;position:relative}
.karaoke-col::after{content:'';position:absolute;bottom:0;left:0;right:0;height:90px;background:linear-gradient(transparent,#000);pointer-events:none;z-index:2}
.klines{display:flex;flex-direction:column;gap:0;transition:transform .7s cubic-bezier(.22,.68,0,.99)}
.kl{font-size:18px;font-weight:300;line-height:1.55;padding:4px 0 4px 2px;color:#2a2a2a;transition:all .55s cubic-bezier(.22,.68,0,.99);cursor:pointer;border-radius:6px}
.kl.active{font-size:23px;font-weight:500;color:#fff;letter-spacing:-.3px}
.kl.next1{color:#555;font-size:17px}
.kl.next2{color:#333;font-size:15px}

.cover-col{width:195px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.cover-wrap{position:relative;width:185px;height:185px}
.cover-glow{position:absolute;inset:-30px;border-radius:50%;transition:background 1.8s ease,opacity 1.8s ease;filter:blur(28px);opacity:.7;z-index:0}
.cover-art{width:185px;height:185px;border-radius:16px;position:relative;overflow:hidden;z-index:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px}
.cover-art canvas{position:absolute;inset:0;width:100%;height:100%}
.cover-badge2{position:relative;z-index:2;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);border-radius:20px;padding:5px 12px;font-size:9px;font-weight:600;letter-spacing:1px;color:#bbb;white-space:nowrap}
.track-info{margin-top:12px;text-align:center;width:185px}
.track-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.2px;line-height:1.3}
.track-art{font-size:12px;color:#555;margin-top:3px}

.settings-panel{background:rgba(15,15,15,.95);border:1px solid rgba(255,255,255,.08);border-radius:14px;margin:0 24px;padding:16px;display:none;flex-direction:column;gap:10px}
.settings-panel.open{display:flex}
.s-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#444;font-weight:500;margin-bottom:2px}
.api-row{display:flex;flex-direction:column;gap:5px}
.api-label{font-size:11px;color:#555;font-weight:500}
.api-input{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:7px 10px;font-size:12px;color:#ccc;font-family:'Inter',sans-serif;outline:none;transition:border .2s;width:100%}
.api-input:focus{border-color:rgba(255,255,255,.2);color:#fff}
.api-input::placeholder{color:#333}
.api-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.wave-zone{padding:14px 24px 0;height:56px}
canvas#waveCanvas{width:100%;height:40px;display:block;border-radius:6px}

.prog-zone{padding:6px 24px 0;display:flex;align-items:center;gap:10px}
.time{font-size:11px;color:#444;font-variant-numeric:tabular-nums;min-width:30px}
.pbar{flex:1;height:2px;background:#1a1a1a;border-radius:1px;cursor:pointer;position:relative}
.pfill{height:100%;background:#fff;border-radius:1px;transition:width .4s linear;position:relative}
.pfill::after{content:'';position:absolute;right:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#fff;opacity:0;transition:opacity .15s}
.pbar:hover .pfill::after{opacity:1}

.ctrls{display:flex;align-items:center;justify-content:space-between;padding:10px 24px 18px}
.cc{display:flex;align-items:center;gap:10px}
.cb{background:none;border:none;cursor:pointer;color:#444;display:flex;align-items:center;justify-content:center;transition:color .2s,transform .1s;padding:5px;border-radius:50%}
.cb:hover{color:#aaa}.cb:active{transform:scale(.9)}.cb.on{color:#fff}
.pbtn{width:46px;height:46px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.pbtn:hover{transform:scale(1.06)}.pbtn:active{transform:scale(.95)}
.vol-wrap{display:flex;align-items:center;gap:6px}
.vol-sl{width:70px;accent-color:#fff;cursor:pointer}

.queue-sec{padding:0 24px 18px}
.q-hdr{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#333;font-weight:500;margin-bottom:8px}
.q-list{display:flex;flex-direction:column;gap:1px}
.qi{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background .15s}
.qi:hover{background:rgba(255,255,255,.04)}
.qi.cur{background:rgba(255,255,255,.05)}
.qi-num{font-size:10px;color:#2a2a2a;width:14px;text-align:center;font-variant-numeric:tabular-nums}
.qi-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:pdot 1.4s ease-in-out infinite}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.3}}
.qi-inf{flex:1;min-width:0}
.qi-t{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qi.cur .qi-t{color:#fff;font-weight:500}
.qi-a{font-size:10px;color:#333}
.qi-d{font-size:10px;color:#2a2a2a;font-variant-numeric:tabular-nums}
.qi-src{width:6px;height:6px;border-radius:50%;flex-shrink:0}
</style>

<div class="pr" id="root">
  <div class="glow-bg" id="glowBg"></div>
  <div class="content">

    <div class="topbar">
      <div class="topbar-left">
        <div class="bypass-pill" id="bypassBtn" onclick="toggleBypass()">
          <div class="bypass-dot" id="bypassDot"></div>
          <span class="bypass-label" id="bypassLabel">Обход цензуры</span>

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </button>
        <button class="tb-btn" id="settingsBtn" onclick="toggleSettings()" title="Настройки">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2"/></svg>

    <div class="main">

        <div class="cover-wrap">
          <div class="cover-glow" id="coverGlow"></div>

    <div class="ctrls">
      <div class="cc">
        <button class="cb" id="shufBtn" onclick="toggleShuffle()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button class="cb" id="repBtn" onclick="toggleRepeat()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
      <div class="cc">
        <button class="cb" onclick="prevT()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="pbtn" id="playBtn" onclick="togglePlay()">
          <svg id="playIco" width="18" height="18" viewBox="0 0 24 24" fill="#000"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="cb" onclick="nextT()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>

    <div class="queue-sec">

      <div class="q-list" id="qList"></div>

  </div>
</div>

<script>
const tracks = [
  {
    title:"Ват из Лав", artist:"JUNIOR", duration:178, currentSec:32,
    color1:"#5b9fd4", color2:"#8ec5f0", color3:"#b8d9f5",
    badge:"ВАТ ИЗ ЛАВ · JUNIOR",
    coverType:"fur",
    lyrics:[
      {t:0, text:"Я покажу тебе, что такое love is"},
      {t:5, text:"Ты танцуешь, как Дженнифер Лопес"},
      {t:10,text:"Твои большие таланты в сторис"},
      {t:15,text:"Я смотрю их, я твой фанат"},
      {t:20,text:"Напиши мне хоть что-нибудь"},
      {t:25,text:"Я читаю каждое слово"},
      {t:30,text:"Ты как солнце, ярче всей планеты"},
      {t:35,text:"Хочу быть твоим приветом"},
      {t:40,text:"Ват из лав, ват из лав"},
      {t:45,text:"Это чувство внутри — ват из лав"},
      {t:50,text:"Ты не знаешь, но я знаю точно"},
      {t:55,text:"Ват из лав"},
    ],
    lyricsE:[
      {t:0, text:"Я покажу тебе, что такое love is"},
      {t:5, text:"Ты танцуешь, как fucking Дженнифер Лопес"},
      {t:10,text:"Твои большие таланты в сторис"},
      {t:15,text:"Я смотрю их, я твой фанат, блять"},
      {t:20,text:"Напиши мне, напиши хоть что-то"},
      {t:25,text:"Я читаю каждое твоё слово"},
      {t:30,text:"Ты как солнце, ярче всей планеты"},
      {t:35,text:"Хочу быть твоим, нахуй этикета"},
      {t:40,text:"Ват из лав, ват из лав"},
      {t:45,text:"Это чувство внутри — ват из лав"},
      {t:50,text:"Ты не знаешь, но я знаю точно"},
      {t:55,text:"Ват из лав"},
    ]
  },
  {
    title:"Монако", artist:"LOBODA", duration:192, currentSec:0,
    color1:"#c084c8", color2:"#e0a8e0", color3:"#f0c8f0",
    badge:"МОНАКО · LOBODA",
    coverType:"purple",
    lyrics:[{t:0,text:"Монако, Монако"},{t:5,text:"Я живу как в кино"},{t:10,text:"Всё легко, всё красиво"},{t:15,text:"Это мой стиль, это я"}],
    lyricsE:[{t:0,text:"Монако, Монако"},{t:5,text:"Живу как в кино, блять"},{t:10,text:"Всё легко, всё красиво"},{t:15,text:"Это мой стиль, это я"}]
  },
  {
    title:"Голая", artist:"Niletto", duration:164, currentSec:0,
    color1:"#d4845a", color2:"#e8a882", color3:"#f5c8a8",
    badge:"ГОЛАЯ · NILETTO",
    coverType:"orange",
    lyrics:[{t:0,text:"Голая правда"},{t:5,text:"Красивее всех"},{t:10,text:"В твоих глазах"},{t:15,text:"Весь мой успех"}],
    lyricsE:[{t:0,text:"Голая правда"},{t:5,text:"Красивее всех, чёрт"},{t:10,text:"В твоих глазах"},{t:15,text:"Весь мой успех"}]
  },
  {
    title:"Superstar", artist:"MACAN", duration:185, currentSec:0,
    color1:"#60a898", color2:"#82c4b4", color3:"#a8dcd0",
    badge:"SUPERSTAR · MACAN",
    coverType:"teal",
    lyrics:[{t:0,text:"Superstar, superstar"},{t:5,text:"Ты горишь ярче звёзд"},{t:10,text:"В темноте, в темноте"},{t:15,text:"Только ты и я"}],
    lyricsE:[{t:0,text:"Superstar, superstar"},{t:5,text:"Горишь ярче звёзд, блять"},{t:10,text:"В темноте, в темноте"},{t:15,text:"Только ты и я"}]
  },
];

let curIdx=0, playing=false, bypass=false, karaokeOn=true, settingsOpen=false;
let shuffle=false, repeat=false;
let curSec=32, raf=null, lastTs=null, curLine=0;
let wavePhase=0, waveRaf=null;

function curTrack(){return tracks[curIdx];}

function getLyrics(){
  const t=curTrack();
  return bypass ? t.lyricsE : t.lyrics;
}

function renderLyrics(){
  const lines=getLyrics();
  const c=document.getElementById('klines');
  c.innerHTML='';
  lines.forEach((l,i)=>{
    const d=document.createElement('div');
    const diff=i-curLine;
    d.className='kl'+(diff===0?' active':diff===1?' next1':diff===2?' next2':'');
    d.textContent=l.text;
    d.onclick=()=>{curLine=i;renderLyrics();};
    c.appendChild(d);
  });
  const rowH=38;
  const offset=Math.max(0,(curLine-1))*rowH;
  c.style.transform=`translateY(-${offset}px)`;
}

function drawCover(){
  const t=curTrack();
  const canvas=document.getElementById('coverCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=185; canvas.height=185;
  const c1=t.color1, c2=t.color2;
  if(t.coverType==='fur'){
    const g=ctx.createLinearGradient(0,0,185,185);
    g.addColorStop(0,'#8ec5f0'); g.addColorStop(0.5,'#a8d4f8'); g.addColorStop(1,'#6aafdc');
    ctx.fillStyle=g; ctx.fillRect(0,0,185,185);
    ctx.save();
    for(let i=0;i<600;i++){
      const x=Math.random()*185, y=Math.random()*185;
      const len=4+Math.random()*10;
      const angle=(Math.random()-.5)*.8;
      ctx.beginPath();
      ctx.moveTo(x,y);
      ctx.lineTo(x+Math.cos(angle)*len, y+Math.sin(angle)*len*.3);
      ctx.strokeStyle=`rgba(255,255,255,${.15+Math.random()*.35})`;
      ctx.lineWidth=.8+Math.random()*.8;
      ctx.lineCap='round';
      ctx.stroke();
    }
    ctx.restore();
    ctx.save();
    const rg=ctx.createRadialGradient(60,50,0,60,50,120);
    rg.addColorStop(0,'rgba(255,255,255,0.25)'); rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg; ctx.fillRect(0,0,185,185);
    ctx.restore();
  } else {
    const g=ctx.createLinearGradient(0,0,185,185);
    g.addColorStop(0,c2); g.addColorStop(1,c1);
    ctx.fillStyle=g; ctx.fillRect(0,0,185,185);
    const rg=ctx.createRadialGradient(55,45,0,55,45,120);
    rg.addColorStop(0,'rgba(255,255,255,0.2)'); rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg; ctx.fillRect(0,0,185,185);
  }
}

function updateGlow(){
  const t=curTrack();
  document.getElementById('coverGlow').style.background=
    `radial-gradient(ellipse at center, ${t.color2} 0%, ${t.color1}88 40%, transparent 75%)`;
  document.getElementById('glowBg').style.background=
    `radial-gradient(ellipse 60% 50% at 75% 35%, ${t.color1}18 0%, transparent 70%)`;
}

function renderQueue(){
  const c=document.getElementById('qList');
  c.innerHTML='';
  tracks.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='qi'+(i===curIdx?' cur':'');
    d.innerHTML=`<div class="qi-num">${i===curIdx?'<div class="qi-dot"></div>':i+1}</div>
    <div style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${t.color2};opacity:.8"></div>
    <div class="qi-inf"><div class="qi-t">${t.title}</div><div class="qi-a">${t.artist}</div></div>
    <div class="qi-d">${Math.floor(t.duration/60)}:${String(t.duration%60).padStart(2,'0')}</div>`;
    d.onclick=()=>loadTrack(i);
    c.appendChild(d);
  });
}

function loadTrack(idx){
  curIdx=idx; curSec=0; lastTs=null; curLine=0;
  const t=curTrack();
  document.getElementById('tName').textContent=t.title;
  document.getElementById('tArt').textContent=t.artist;
  document.getElementById('coverBadge').textContent=t.badge;
  drawCover(); updateGlow(); renderQueue(); renderLyrics(); updateProg();
}

function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+String(sec).padStart(2,'0');}

function updateProg(){
  const t=curTrack();
  const pct=Math.min(100,(curSec/t.duration)*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('tCur').textContent=fmt(curSec);
  document.getElementById('tTot').textContent=fmt(t.duration);
  const lines=getLyrics();
  let nl=0;
  lines.forEach((l,i)=>{if(curSec>=l.t)nl=i;});
  if(nl!==curLine){curLine=nl;renderLyrics();}
}

function tick(ts){
  if(lastTs!==null){
    curSec=Math.min(curTrack().duration,curSec+(ts-lastTs)/1000);
    if(curSec>=curTrack().duration){
      if(repeat){curSec=0;}else{playing=false;updatePlayIcon();return;}
    }
  }
  lastTs=ts;
  updateProg();
  if(playing)raf=requestAnimationFrame(tick);
}

function togglePlay(){
  playing=!playing; updatePlayIcon();
  if(playing){lastTs=null;raf=requestAnimationFrame(tick);}
  else cancelAnimationFrame(raf);
}

function updatePlayIcon(){
  const ico=document.getElementById('playIco');
  ico.innerHTML=playing
    ?'<rect x="6" y="4" width="4" height="16" fill="#000"/><rect x="14" y="4" width="4" height="16" fill="#000"/>'
    :'<polygon points="5 3 19 12 5 21 5 3" fill="#000"/>';
}

function seekClick(e){
  const r=document.getElementById('pbar').getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  curSec=pct*curTrack().duration; lastTs=null; updateProg();
}

function toggleBypass(){
  bypass=!bypass;
  const btn=document.getElementById('bypassBtn');
  btn.classList.toggle('on',bypass);
  renderLyrics();
}

function toggleKaraoke(){
  karaokeOn=!karaokeOn;
  document.getElementById('karaokeCol').style.display=karaokeOn?'':'none';
  document.getElementById('karaokeBtn').classList.toggle('active',karaokeOn);
}

function toggleSettings(){
  settingsOpen=!settingsOpen;
  document.getElementById('settingsPanel').classList.toggle('open',settingsOpen);
  document.getElementById('settingsBtn').classList.toggle('active',settingsOpen);
}

function toggleShuffle(){shuffle=!shuffle;document.getElementById('shufBtn').classList.toggle('on',shuffle);}
function toggleRepeat(){repeat=!repeat;document.getElementById('repBtn').classList.toggle('on',repeat);}
function prevT(){curSec=0;lastTs=null;curLine=0;renderLyrics();updateProg();}
function nextT(){
  const ni=(curIdx+1)%tracks.length;
  loadTrack(ni);
  if(playing){lastTs=null;raf=requestAnimationFrame(tick);}
}

function drawWave(){
  const canvas=document.getElementById('waveCanvas');
  const W=canvas.offsetWidth||620, H=40;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const bars=80;
  const bw=W/bars;
  const t=curTrack();
  for(let i=0;i<bars;i++){
    const x=i*bw+bw*.2;
    const progress=(i/bars);
    const isPlayed=progress<(curSec/curTrack().duration);
    const wave=Math.sin(i*.25+wavePhase)*0.3+Math.sin(i*.08+wavePhase*.7)*0.4+Math.sin(i*.5+wavePhase*1.3)*0.15;
    const base=0.15;
    let h=(base+Math.abs(wave))*H*.85;
    if(playing){
      const beat=Math.sin(wavePhase*2+i*.2);
      h*=(1+beat*.12);
    }
    h=Math.max(3,Math.min(H*.9,h));
    const y=(H-h)/2;
    if(isPlayed){
      ctx.fillStyle=t.color2;
    } else {
      ctx.fillStyle='rgba(255,255,255,0.1)';
    }
    ctx.beginPath();
    ctx.roundRect(x,y,bw*.6,h,2);
    ctx.fill();
  }
  wavePhase+=playing?.04:.008;
  waveRaf=requestAnimationFrame(drawWave);
}

loadTrack(0);
drawWave();
document.getElementById('bypassBtn').classList.remove('on');
</script>
